<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Projeto no VS Code Cloud</title>
    <style>
        /* Estilização básica para o site não ficar feio */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #007acc; /* Azul padrão do VS Code */
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            color: #666;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007acc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #005999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Projeto Online!</h1>
        <p>O seu arquivo <strong>index.html</strong> foi configurado com sucesso no VS Code Cloud.</p>
        <p>Agora é só começar a editar e criar sua aplicação.</p>
        <a href="#" class="btn">Clique Aqui</a>
    </div>

</body>
</html>
